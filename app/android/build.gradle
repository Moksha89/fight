buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"

            // 👇 Add these lines to override text-recognition defaults
    TextRecognition_compileSdkVersion = 35
    TextRecognition_buildToolsVersion = "35.0.0"
    TextRecognition_minSdkVersion = 24
    TextRecognition_targetSdkVersion = 35
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Pin AGP to 8.6.1 so native modules (webview, video, etc.) resolve; 8.8.2 causes "No matching variant"
        classpath("com.android.tools.build:gradle:8.6.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
