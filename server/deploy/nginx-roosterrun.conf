# =============================================================================
# Kokoroko / RoosterRun Nginx Configuration Template
# =============================================================================
# Copy to /etc/nginx/sites-available/roosterrun
# Symlink to /etc/nginx/sites-enabled/
# Adjust SSL cert paths and domain names as needed.
#
# Prerequisites:
#   - SSL certs via Let's Encrypt: certbot certonly --webroot -w /var/www/html -d roosterrun.io -d www.roosterrun.io -d api.roosterrun.io
#   - /etc/nginx/snippets/proxy-params.conf with standard proxy headers
#   - Rate limit zones defined in /etc/nginx/conf.d/rate-limits.conf (see below)
# =============================================================================

# --- Rate limit zones (place in /etc/nginx/conf.d/rate-limits.conf) ---
# limit_req_zone $binary_remote_addr zone=otp:10m rate=3r/m;
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=forgot_pwd:10m rate=3r/m;
# limit_req_zone $binary_remote_addr zone=bet:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
# limit_req_zone $binary_remote_addr zone=admin_api:10m rate=30r/m;
# limit_conn_zone $binary_remote_addr zone=ws_conn:10m;
# log_format ws_safe '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer"';

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name roosterrun.io www.roosterrun.io api.roosterrun.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main site (roosterrun.io and www.roosterrun.io)
server {
    listen 443 ssl http2;
    server_name roosterrun.io www.roosterrun.io;

    ssl_certificate /etc/letsencrypt/live/roosterrun.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roosterrun.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security max-age=63072000 always;

    client_max_body_size 2m;

    # Landing page
    location = / {
        root /opt/kokoroko/web;
        try_files /landing.html =404;
    }

    # Player web app
    location /play/ {
        alias /opt/kokoroko/web/play/;
        try_files $uri $uri/ /play/index.html;
    }

    # APK downloads
    location = /roosterrun.apk {
        root /opt/kokoroko/web;
        add_header Content-Disposition 'attachment; filename=roosterrun.apk';
        try_files /roosterrun.apk /kokoroko.apk =404;
    }

    # --- Rate-limited API endpoints ---

    location /api/user/getotp/ {
        limit_req zone=otp burst=2 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/user/login/ {
        limit_req zone=login burst=3 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/user/forgot-password/ {
        limit_req zone=forgot_pwd burst=2 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/cockfight/bets/place-bet/ {
        limit_req zone=bet burst=10 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/dice-play/bets/place-bet/ {
        limit_req zone=bet burst=10 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/wallet/deposit/ {
        limit_req zone=api_general burst=30 nodelay;
        client_max_body_size 15m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        client_max_body_size 2m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /auth/ {
        limit_req zone=login burst=3 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin-api/ {
        limit_req zone=admin_api burst=10 nodelay;
        client_max_body_size 15m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        limit_req zone=admin_api burst=20 nodelay;
        client_max_body_size 15m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket connections
    location /ws/ {
        access_log /var/log/nginx/ws_access.log ws_safe;
        error_log /var/log/nginx/ws_error.log warn;
        limit_conn ws_conn 10;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /opt/kokoroko/staticfiles/;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header X-Forwarded-Proto https;
    }
}

