# =============================================================================
# Kokoroko Rate Limit Zones — include in the http {} block of nginx.conf
# =============================================================================
#
# Usage: Add this line inside the http {} block of /etc/nginx/nginx.conf:
#   include /etc/nginx/conf.d/kokoroko-rate-limits.conf;
#
# Then use limit_req directives in server/location blocks.
# =============================================================================

# OTP request: 5 requests/minute per IP (strict — OTPs are expensive/sensitive)
limit_req_zone $binary_remote_addr zone=otp:10m rate=5r/m;

# Login/auth: 10 requests/minute per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# Forgot password: 5 requests/minute per IP
limit_req_zone $binary_remote_addr zone=forgot_pwd:10m rate=5r/m;

# Bet placement: 30 requests/minute per IP
# Higher than per-user DRF limits because multiple users may share an IP (NAT)
# and dice multi-number betting sends up to 5 sequential calls per round
limit_req_zone $binary_remote_addr zone=bet:10m rate=30r/m;

# General API: 120 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;

# Admin API: 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=60r/m;

# WebSocket connection limit: max 10 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# Custom 429 error page
limit_req_status 429;
limit_conn_status 429;
