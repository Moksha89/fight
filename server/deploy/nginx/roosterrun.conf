# =============================================================================
# Admin panel (port 8080 — IP-direct access, HTTP)
# =============================================================================
server {
    listen 8080;
    listen [::]:8080;
    server_name 155.117.46.249;

    # Admin uploads may be larger
    client_max_body_size 15m;

    # API and Admin
    location /api/ {
        limit_req zone=admin_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /auth/ {
        limit_req zone=login burst=3 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
