# =============================================================================
# Kokoroko / RoosterRun Nginx Site Configuration
# =============================================================================
# Rate limit zones defined in /etc/nginx/conf.d/kokoroko-rate-limits.conf
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name roosterrun.io www.roosterrun.io api.roosterrun.io;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main site (roosterrun.io and www.roosterrun.io)
# =============================================================================
server {
    listen 443 ssl http2;
    server_name roosterrun.io www.roosterrun.io;

    ssl_certificate /etc/letsencrypt/live/roosterrun.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roosterrun.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Default body size for this server block
    client_max_body_size 2m;

    # Landing page
    location = / {
        root /opt/kokoroko/web;
        try_files /landing.html =404;
    }

    # Player web app
    location /play/ {
        alias /opt/kokoroko/web/play/;
        try_files $uri $uri/ /play/index.html;
    }

    # APK downloads
    location = /roosterrun.apk {
        root /opt/kokoroko/web;
        add_header Content-Disposition 'attachment; filename=roosterrun.apk';
        try_files /roosterrun.apk /kokoroko.apk =404;
        client_max_body_size 0;
    }

    location = /kokoroko.apk {
        root /opt/kokoroko/web;
        add_header Content-Disposition 'attachment; filename=roosterrun.apk';
        try_files /kokoroko.apk =404;
        client_max_body_size 0;
    }

    # ─── Rate-limited API endpoints ─────────────────────────────────────

    # OTP request — strict limit
    location = /api/user/getotp/ {
        limit_req zone=otp burst=2 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Login
    location = /api/user/login/ {
        limit_req zone=login burst=3 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Forgot password endpoints
    location /api/user/forgot-password/ {
        limit_req zone=forgot_pwd burst=2 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Registration
    location = /api/user/register/ {
        limit_req zone=login burst=2 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Bet placement — dice
    location = /api/dice-play/bets/place-bet/ {
        limit_req zone=bet burst=10 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Bet placement — cockfight
    location = /api/cockfight/bets/place-bet/ {
        limit_req zone=bet burst=10 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Deposit — allow larger body for screenshot uploads
    location /api/wallet/deposit/ {
        limit_req zone=api_general burst=10 nodelay;
        client_max_body_size 15m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Admin API
    location /admin-api/ {
        limit_req zone=admin_api burst=10 nodelay;
        client_max_body_size 15m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── General API (catch-all for /api/) ───────────────────────────────

    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        client_max_body_size 2m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    location /auth/ {
        limit_req zone=login burst=5 nodelay;
        client_max_body_size 5k;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ─── WebSocket connections ───────────────────────────────────────────

    location /ws/ {
        limit_conn ws_conn 10;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # ─── Health check ────────────────────────────────────────────────────

    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Static & Media ─────────────────────────────────────────────────

    location /static/ {
        alias /opt/kokoroko/staticfiles/;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Catch-all to Django
    location / {
        limit_req zone=api_general burst=30 nodelay;
        client_max_body_size 2m;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/proxy-params.conf;
    }
}

