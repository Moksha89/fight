{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}{{ title }} | RoosterRun Admin{% endblock %}

{% block branding %}
<h1 id="header-branding" style="display:none;"><a href="/">RoosterRun</a></h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ MATERIAL ICONS FONT (self-hosted fallback) ============ */
@font-face {
  font-family: 'Material Icons';
  font-style: normal;
  font-weight: 400;
  src: url('/fonts/materialicons.woff2') format('woff2'), url(https://fonts.gstatic.com/s/materialicons/v145/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2) format('woff2');
  font-display: block;
}
/* ============ CSS VARIABLES — ROOSTERRUN DESIGN SYSTEM (Admin Panel) ============ */
/* Synced with Android ThemeContext.js + Web play/index.html. All 3 platforms share these tokens. */
:root {
    /* ====================================================================
       GLOBAL THEME VARIABLES — Change these to restyle the entire admin.
       To switch themes, just update these values. Every element uses them.
       ==================================================================== */

    /* === ACCENT COLOR (buttons, links, active states) === */
    --accent: #6ABDA7;              /* Primary accent — mint */
    --accent-dark: #4FA88F;         /* Accent hover/pressed */
    --accent-light: #B4DDD1;        /* Accent lighter variant */
    --accent-bg: rgba(106,189,167,0.10);   /* Accent tinted background */
    --accent-bg-hover: rgba(106,189,167,0.18);
    --accent-border: var(--accent-border);
    --accent-text: #FFFFFF;         /* Text on accent-colored buttons */

    /* === BACKGROUNDS === */
    --bg-main: #F5F5F5;             /* Page background */
    --bg-card: #FFFFFF;             /* Cards, fieldsets, tables */
    --bg-elevated: #F0F0F0;         /* Table headers, section headers */
    --bg-card-hover: #FAFAFA;       /* Row hover */
    --bg-hover: #F8F8F8;            /* General hover */
    --bg-sidebar: #1A1A1A;          /* Sidebar stays dark */
    --bg-header: #FFFFFF;           /* Top header bar */
    --bg-input: #FFFFFF;            /* Input fields */

    /* === TEXT === */
    --text-primary: #111111;        /* Main text */
    --text-secondary: #555555;      /* Secondary/labels */
    --text-muted: #999999;          /* Muted/placeholder */
    --text-on-accent: #FFFFFF;      /* Text on accent buttons */
    --text-sidebar: #CCCCCC;        /* Sidebar text */
    --text-sidebar-active: #FFFFFF; /* Sidebar active text */

    /* === BORDERS === */
    --border: #E0E0E0;              /* Default border */
    --border-light: #EEEEEE;        /* Lighter border */
    --border-subtle: #F0F0F0;       /* Very subtle border */

    /* === STATUS COLORS === */
    --success: #22C55E;
    --success-dark: #16a34a;
    --danger: #F8605B;
    --danger-dark: #e24842;
    --warning: #F59E0B;
    --warning-dark: #d97706;
    --info: #3B82F6;

    /* === GAME COLORS === */
    --meron: #DC2626;
    --meron-light: #ef4444;
    --wala: #2563EB;
    --wala-light: #3b82f6;
    --draw: #A855F7;
    --draw-light: #c084fc;

    /* === LAYOUT === */
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;

    /* === LEGACY ALIASES (mapped to new vars for compatibility) === */
    --gold: var(--accent);
    --gold-dark: var(--accent-dark);
    --gold-light: var(--accent-light);
    --gold-bg: var(--accent-bg);
    --gold-bg-hover: var(--accent-bg-hover);
    --gold-border: var(--border);
    --gold-border-strong: var(--accent-border);
    --gold-glow: var(--accent-bg);
    --bg: var(--bg-main);
    --bg-surface: var(--bg-main);
    --bg-white: var(--bg-card);
    --text-on-gold: var(--text-on-accent);
    --text-label: var(--text-muted);
}

/* ============ RESET & BASE ============ */
* { box-sizing: border-box; }
body, html {
    margin: 0; padding: 0;
    background: var(--bg-main) !important;
    color: var(--text-primary) !important;
    font-family: 'Inter', -apple-system, sans-serif !important;
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    font-size: 14px;
}
i, .material-icons {
    font-family: 'Material Icons' !important;
    font-weight: normal; font-style: normal;
    font-size: 20px; line-height: 1;
    letter-spacing: normal; text-transform: none;
    display: inline-block; white-space: nowrap;
    word-wrap: normal; direction: ltr;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}
/* Global table background fix - prevent white bg from base CSS */
table, thead, tbody, tr, td, th {
    background-color: transparent !important;
    color: var(--text-primary);
}
/* Hide ALL default admin chrome */
#header, .breadcrumbs, #user-tools, .header,
nav.navbar, .ma-tools-icons, [class*="ma-tools"],
#branding, .login-form { display: none !important; }

/* ============ LAYOUT ============ */
#roosterrun-sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 220px;
    height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid rgba(255,255,255,0.08);
    z-index: 9000;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
}
#roosterrun-sidebar::-webkit-scrollbar { width: 3px; }
#roosterrun-sidebar::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

#roosterrun-main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    min-width: 0;
    width: calc(100vw - 220px);
    max-width: calc(100vw - 220px);
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    overflow-y: auto;
    height: 100vh;
}
#roosterrun-header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    min-height: 52px;
    flex-shrink: 0;
}
#roosterrun-content {
    flex: 1;
    padding: 20px 24px;
}

/* ============ SIDEBAR (Dark + Gold) ============ */
.sb-brand {
    padding: 16px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
}
.sb-brand img { width: 34px; height: 34px; border-radius: 8px; }
.sb-brand span { color: var(--text-sidebar-active); font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }

.sb-section { padding: 8px 6px 2px; }
.sb-title {
    color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.4px;
    padding: 6px 14px; margin-bottom: 2px;
}
.sb-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; margin: 2px 6px;
    border-radius: 8px; text-decoration: none;
    color: var(--text-sidebar); font-size: 13px; font-weight: 400;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
}
.sb-item:hover { background: rgba(255,255,255,0.08); color: var(--text-sidebar-active); }
.sb-item.active {
    background: var(--accent-bg-hover);
    color: var(--accent);
    font-weight: 500;
    border-left-color: var(--accent);
}
.sb-item i { font-size: 18px; width: 22px; text-align: center; opacity: 0.7; color: var(--accent-light); }
.sb-item:hover i { opacity: 1; color: var(--accent); }
.sb-item.active i { opacity: 1; color: var(--accent); }
.sb-divider { height: 1px; background: rgba(255,255,255,0.10); margin: 8px 18px; }
.sb-badge { display: none; margin-left: auto; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; font-size: 10px; font-weight: 700; line-height: 20px; text-align: center; color: #FFF; background: var(--danger); }
.sb-badge.sb-badge-green { background: var(--success); }
.sb-badge.has-count { display: inline-block; }

/* ============ HEADER (Dark) ============ */
.header-title { color: var(--text-primary); font-size: 20px; font-weight: 600; }
.header-breadcrumb { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.header-breadcrumb a { color: var(--text-secondary); text-decoration: none; }
.header-breadcrumb a:hover { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 14px; }
.header-btn {
    background: var(--accent);
    border: none; color: var(--accent-text);
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s;
}
.header-btn:hover { background: var(--accent-dark); color: var(--accent-text); transform: translateY(-1px); }
.header-user {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-secondary); font-size: 13px;
}
.header-user .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent-bg); color: var(--accent); font-weight: 600; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--gold-border);
}

/* ============ CONTENT AREA ============ */
html body #container, body > #container, #container#container { margin-left: 220px !important; width: calc(100vw - 220px) !important; max-width: calc(100vw - 220px) !important; min-width: 0 !important; padding: 0 !important; background: var(--bg-main) !important; overflow-x: hidden !important; }
#container .indent { margin-left: 0 !important; width: 100% !important; }
#content, #content-main { padding: 20px 24px !important; background: var(--bg-main) !important; width: 100% !important; max-width: 100% !important; min-width: 0 !important; overflow-x: hidden !important; }
#changelist, #changelist-form { min-width: 0 !important; max-width: 100% !important; overflow-x: hidden !important; width: 100% !important; }
.object-tools { max-width: 100% !important; overflow: hidden !important; }
#changelist-form > div:not(.results) { max-width: 100% !important; overflow-x: hidden !important; }
#content h1, #content-main h1 { display: none !important; }

/* ============ TABLES (Dark, premium) ============ */
#result_list, .results { width: 100% !important; overflow: hidden !important; min-width: 0 !important; max-width: 100% !important; }
#result_list table, .results table {
    background: var(--bg-card) !important; border-radius: 12px !important;
    border: 1px solid var(--border) !important; overflow: hidden;
    width: 100% !important; min-width: max-content !important; border-collapse: collapse !important;
}

/* ============ TABLE SCROLL WRAPPER ============ */
.table-scroll-wrapper {
    display: block;
    width: 100%;
    max-width: calc(100vw - 220px - 48px);
    overflow-x: auto;
    overflow-y: hidden;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-card);
}
.table-scroll-wrapper table {
    min-width: max-content;
    width: 100%;
    border-collapse: collapse;
    border: none !important;
    border-radius: 0 !important;
}
.table-scroll-wrapper::-webkit-scrollbar { height: 8px; }
.table-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--accent-dark); border-radius: 8px; }
.table-scroll-wrapper::-webkit-scrollbar-track { background: var(--bg-card); }

/* ============ STICKY TABLE HEADER ============ */
.table-scroll-wrapper thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg-elevated) !important;
}

/* ============ ACTION DROPDOWN (More...) ============ */
.action-more-wrap { position: relative; display: inline-block; }
.action-more-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    font-size: 18px; font-weight: 700; text-decoration: none;
    cursor: pointer; background: var(--bg-card); color: var(--text-primary);
    border: 1px solid var(--border); transition: all 0.2s;
    line-height: 1;
}
.action-more-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
.action-more-dropdown {
    display: none; position: absolute; right: 0; top: 34px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); z-index: 500;
    min-width: 160px; padding: 6px 0;
}
.action-more-dropdown.show { display: block; }
.action-more-dropdown a {
    display: flex !important; align-items: center; gap: 8px;
    padding: 8px 14px !important; font-size: 13px !important;
    color: var(--text-secondary) !important; text-decoration: none !important;
    width: auto !important; height: auto !important; border-radius: 0 !important;
    border: none !important; background: transparent !important;
    margin: 0 !important; white-space: nowrap;
}
.action-more-dropdown a:hover {
    background: var(--accent-bg) !important; color: var(--accent) !important;
}
.action-more-dropdown a .more-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
}
.action-more-dropdown a[title="Statement"] .more-icon { background: rgba(59,130,246,0.15); color: var(--info); }
.action-more-dropdown a[title="Bet History"] .more-icon { background: rgba(168,85,247,0.15); color: var(--draw); }
.action-more-dropdown a[title="Blacklist"] .more-icon { background: rgba(239,68,68,0.12); color: var(--danger); }
.action-more-dropdown a[title="Whitelist"] .more-icon { background: rgba(34,197,94,0.12); color: var(--success); }
.action-more-dropdown a[title="Reset Password"] .more-icon { background: rgba(0,0,0,0.10); color: #333333; }

/* ============ RESPONSIVE COLUMN HIDING ============ */
@media (max-width: 1500px) {
    .col-hide-1200 { display: none !important; }
}
@media (max-width: 1024px) {
    .col-hide-1024 { display: none !important; }
}
@media (max-width: 768px) {
    .col-hide-768 { display: none !important; }
}
#result_list th, .results th {
    background: var(--bg-elevated) !important; color: var(--text-secondary) !important;
    font-size: 11px !important; text-transform: uppercase !important;
    font-weight: 600 !important; letter-spacing: 0.6px !important;
    border-bottom: 1px solid var(--gold-border) !important; padding: 10px 10px !important;
    white-space: nowrap !important;
}
#result_list th a, .results th a { color: var(--text-muted) !important; text-decoration: none !important; }
#result_list th a:hover, .results th a:hover { color: var(--accent) !important; }
#result_list td, .results td {
    color: var(--text-primary) !important; font-size: 13px !important; padding: 10px 10px !important;
    border-bottom: 1px solid var(--border) !important;
    white-space: nowrap !important;
}
#result_list tbody tr, .results tbody tr {
    background: var(--bg-card) !important;
}
#result_list tbody tr:nth-child(even), .results tbody tr:nth-child(even) { background: var(--bg-hover) !important; }
#result_list tbody tr:hover, .results tbody tr:hover { background: var(--bg-hover) !important; }

/* ============ ACTION BUTTONS (D/W/S/BH/BL/PR) ============ */
a[title="Deposit"], a[title="Withdraw"], a[title="Statement"],
a[title="Bet History"], a[title="Blacklist"], a[title="Whitelist"],
a[title="Reset Password"] {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 8px;
    font-size: 11px; font-weight: 700; text-decoration: none;
    margin-right: 3px; transition: all 0.2s;
}
a[title="Deposit"] { background: var(--success) !important; color: #FFFFFF !important; border: none !important; }
a[title="Withdraw"] { background: var(--warning) !important; color: #000 !important; border: none !important; }
a[title="Statement"] { background: var(--info) !important; color: #FFFFFF !important; border: none !important; }
a[title="Bet History"] { background: var(--draw) !important; color: #FFFFFF !important; border: none !important; }
a[title="Blacklist"] { background: rgba(239,68,68,0.12) !important; color: var(--danger) !important; border: 1px solid rgba(239,68,68,0.25) !important; }
a[title="Whitelist"] { background: rgba(34,197,94,0.12) !important; color: var(--success) !important; border: 1px solid rgba(34,197,94,0.25) !important; }
a[title="Reset Password"] { background: #333333 !important; color: #FFFFFF !important; border: none !important; }
a[title="Deposit"]:hover, a[title="Withdraw"]:hover, a[title="Statement"]:hover,
a[title="Bet History"]:hover, a[title="Blacklist"]:hover, a[title="Whitelist"]:hover,
a[title="Reset Password"]:hover { transform: translateY(-1px); opacity: 0.9; }

/* General link accent color */
#content a:not([class]):not([title]),
#content-main a:not([class]):not([title]),
.form-row a, .help a, .inline-related a,
fieldset a:not(.related-widget-wrapper a):not([title]) {
    color: var(--accent) !important;
}
#content a:not([class]):not([title]):hover,
fieldset a:not(.related-widget-wrapper a):not([title]):hover {
    color: var(--accent-dark) !important;
    text-decoration: underline !important;
}

/* Search button accent */
#searchbar button, button[type="submit"] i.material-icons,
.search-btn, #changelist-search button {
    color: var(--accent) !important;
}

/* ============ FORMS & INPUTS ============ */
input, select, textarea {
    background: var(--bg-input) !important; border: 1px solid var(--border) !important;
    color: var(--text-primary) !important; border-radius: 8px !important;
    padding: 8px 12px !important; font-size: 13px !important;
    height: auto !important;
    -webkit-text-fill-color: var(--text-primary) !important;
}
/* Force dark text on all input types across the admin */
body input, body select, body textarea,
body input[type="text"], body input[type="number"],
body input[type="email"], body input[type="password"],
body input[type="url"], body input[type="search"],
body input[type="tel"], body input[type="date"],
body .input-field input, body .input-field textarea,
fieldset input, fieldset select, fieldset textarea,
#content input, #content select, #content textarea,
#changelist input, #changelist select, #changelist textarea,
.form-row input, .form-row select, .form-row textarea {
    color: var(--text-primary) !important;
    -webkit-text-fill-color: var(--text-primary) !important;
}
/* Select2 rendered text */
.select2-container .select2-selection__rendered,
.select2-container--default .select2-selection--single .select2-selection__rendered,
.select2-container .select2-selection,
.select2-results__option {
    color: var(--text-primary) !important;
    -webkit-text-fill-color: var(--text-primary) !important;
}
/* Placeholder text should be muted */
input::placeholder, textarea::placeholder {
    color: var(--text-muted) !important;
    -webkit-text-fill-color: var(--text-muted) !important;
    opacity: 1 !important;
}
#result_list textarea { width: 100px !important; height: 32px !important; min-height: 32px !important; max-height: 60px !important; resize: vertical !important; font-size: 11px !important; padding: 3px 5px !important; }
#result_list input[type="text"], #result_list input[type="number"] { width: 100px !important; font-size: 12px !important; padding: 4px 6px !important; }
#result_list td { font-size: 12px !important; padding: 8px 6px !important; white-space: nowrap; }
#result_list th { font-size: 11px !important; padding: 8px 6px !important; white-space: nowrap; }
input:focus, select:focus, textarea:focus {
    border-color: var(--accent) !important; outline: none !important;
    box-shadow: 0 0 0 3px var(--accent-bg) !important;
}

/* ============ BUTTONS ============ */
input[type="submit"], .submit-row input, button[type="submit"] {
    background: var(--accent) !important; color: var(--accent-text) !important;
    font-weight: 600 !important; border: none !important;
    border-radius: 8px !important; padding: 10px 24px !important;
    cursor: pointer !important; font-size: 14px !important;
    transition: all 0.2s !important;
}
input[type="submit"]:hover, .submit-row input:hover, button[type="submit"]:hover {
    background: var(--accent-dark) !important;
    transform: translateY(-1px) !important;
}
.deletelink, a.deletelink {
    background: rgba(239,68,68,0.15) !important; color: var(--danger) !important;
    border: 1px solid rgba(239,68,68,0.3) !important;
    border-radius: 8px !important; padding: 10px 20px !important;
    text-decoration: none !important;
}
.deletelink:hover, a.deletelink:hover { background: var(--danger) !important; color: #FFF !important; }

/* ============ LINKS ============ */
a { color: var(--text-primary); text-decoration: none; }
a:hover { color: var(--accent); }
#result_list td a, .results td a, #result_list th a { color: var(--accent) !important; font-weight: 500 !important; }
#result_list td a:hover, .results td a:hover { color: var(--accent) !important; }

/* ============ PAGINATION ============ */
.paginator, #changelist .paginator {
    background: var(--bg-card) !important; border: 1px solid var(--border) !important;
    border-radius: 12px !important; padding: 14px 18px !important;
    color: var(--text-muted) !important; font-size: 13px !important;
    margin-top: 16px !important;
}
.paginator a { color: var(--accent) !important; text-decoration: none !important; padding: 4px 10px !important; }
.paginator .this-page { color: var(--accent) !important; font-weight: 700 !important; background: var(--accent-bg) !important; border: 1px solid var(--accent-border) !important; padding: 4px 10px !important; border-radius: 6px !important; }
.paginator ul, p.paginator ul, .pagination {
    list-style: none !important; padding: 0 !important; margin: 0 !important;
    display: flex !important; gap: 4px !important; flex-wrap: wrap !important;
}
.paginator ul li, .pagination li { list-style: none !important; display: inline-block !important; }
.paginator ul li a, .pagination li a {
    background: var(--bg-elevated) !important; color: var(--text-secondary) !important;
    padding: 6px 14px !important; border-radius: 6px !important;
    text-decoration: none !important; font-size: 13px !important;
    border: 1px solid var(--border) !important;
}
.paginator ul li a:hover, .pagination li a:hover {
    background: var(--accent) !important; color: var(--accent-text) !important; border-color: var(--accent) !important;
}
.paginator ul li.active a { background: var(--accent) !important; color: var(--accent-text) !important; font-weight: 600 !important; border-color: var(--accent) !important; }

/* ============ FILTER PANEL ============ */
#content-main.list-content, #content-main {
    display: flex !important;
    flex-direction: column !important;
}
.side-wrapper {
    width: 100% !important;
    order: -1 !important;
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 6px !important;
    margin-bottom: 6px !important;
}
.side-wrapper .card {
    flex: 1 !important;

 border-left: 3px solid var(--accent) !important; padding-left: 12px !important;}
fieldset {

/* ============ DASHBOARD ============ */
.dash-grid {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 12px; margin-bottom: 20px;
}
.dash-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; position: relative; overflow: hidden;
    transition: all 0.2s;
}
.dash-card:hover { border-color: var(--gold-border-strong); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.dash-card .label { color: var(--text-muted); font-size: 11px; font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.dash-card .value { color: var(--text-primary); font-size: 20px; font-weight: 700; }
.dash-card .sub { color: var(--text-muted); font-size: 10px; margin-top: 4px; }
.dash-card .icon-bg {
    position: absolute; top: 12px; right: 12px;
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--gold-bg);
    border: 1px solid var(--gold-border);
}
.dash-card .icon-bg i { font-size: 18px; color: var(--gold); }

.dash-filter {
    display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.dash-filter button {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 500; transition: all 0.2s;
}
.dash-filter button:hover, .dash-filter button.active {
    background: var(--gold); color: #000; border-color: var(--gold);
}

.dash-grid, .dash-table, .dash-filter { width: 100% !important; max-width: 100% !important; }
.dash-table {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-top: 14px;
}
.dash-table h3 {
    padding: 14px 18px; margin: 0; color: var(--text-primary);
    font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--gold-border);
}
.dash-table table { width: 100%; border-collapse: collapse; }
.dash-table th {
    background: var(--bg-elevated); color: var(--text-muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 14px;
    text-align: left; font-weight: 600;
}
.dash-table td {
    padding: 10px 14px; color: var(--text-primary) !important; font-size: 13px;
    border-bottom: 1px solid var(--border);
    background: transparent !important;
}
.dash-table tr { background: transparent !important; }
.dash-table tr:hover td { background: var(--bg-hover) !important; }

.badge {
    display: inline-block; padding: 3px 12px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
}
.badge-green { background: rgba(34,197,94,0.12); color: var(--success); }
.badge-orange { background: rgba(245,158,11,0.12); color: var(--warning); }
.badge-gold { background: var(--gold-bg); color: var(--gold); }
.badge-red { background: rgba(239,68,68,0.12); color: var(--danger); }

/* ============ MODAL ============ */
.modal-overlay {
    position: fixed !important; top: 0 !important; left: 0 !important;
    right: 0 !important; bottom: 0 !important;
    background: rgba(0,0,0,0.6) !important;
    display: flex !important; align-items: center !important; justify-content: center !important;
    z-index: 10000 !important; backdrop-filter: blur(6px);
}
.modal-overlay .modal-content {
    background: var(--bg-card) !important; border: 1px solid var(--border) !important;
    border-radius: 16px !important; padding: 28px !important;
    max-width: 440px !important; width: 90% !important;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5) !important;
}
.modal-overlay .modal-content h2 { margin: 0 0 12px !important; font-size: 18px !important; color: var(--text-primary) !important; }
.modal-overlay .modal-content .info { color: var(--text-secondary) !important; font-size: 13px !important; margin: 4px 0 !important; }
.modal-overlay .modal-content .balance { color: var(--success) !important; font-size: 15px !important; font-weight: 600 !important; margin: 0 0 16px !important; }

/* Hide breadcrumbs */
div.breadcrumbs { display: none !important; }

/* ============ SHARED RESPONSIVE HELPERS ============ */
.mobile-toggle {
    display: none; background: none; border: none; color: var(--text-primary);
    cursor: pointer; padding: 0; border-radius: 6px; transition: background 0.2s;
    width: 36px; height: 36px; min-width: 36px; min-height: 36px;
    flex-shrink: 0; align-items: center; justify-content: center;
    font-size: 22px; line-height: 36px; text-align: center;
}

.mobile-toggle:hover { background: var(--gold-bg); }

    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 8999;
    backdrop-filter: blur(2px); transition: opacity 0.3s;
}
.sidebar-backdrop.show { display: block; }

/* ============ RESPONSIVE — TABLET (768px–1023px) Icon-only rail ============ */
@media (min-width: 768px) and (max-width: 1023px) {
    #roosterrun-sidebar {
        width: 60px;
        transition: width 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s;
    }

    #roosterrun-sidebar .sb-brand img { width: 28px; height: 28px; }
    #roosterrun-sidebar .sb-brand span { display: none; }
    #roosterrun-sidebar .sb-title { display: none; }
    #roosterrun-sidebar .sb-item {
        font-size: 0; line-height: 0;
        padding: 12px 0; margin: 1px 4px;
        justify-content: center;
        border-left: none; overflow: hidden;
        position: relative;
    }
    #roosterrun-sidebar .sb-item i { font-size: 20px; width: auto; opacity: 0.6; }
    #roosterrun-sidebar .sb-item.active { background: var(--gold-bg-hover); }

    #roosterrun-sidebar .sb-item:hover i { opacity: 1; color: var(--gold-light); }
    #roosterrun-sidebar .sb-badge { display: none !important; }
    #roosterrun-sidebar .sb-divider { margin: 4px 10px; }
    /* Tooltip on hover */
    #roosterrun-sidebar:not(.expanded) .sb-item:hover::after {
        content: attr(data-label);
        position: absolute; left: 54px; top: 50%; transform: translateY(-50%);
        background: var(--bg-card); color: var(--text-primary);
        font-size: 12px; line-height: 1.3; padding: 5px 10px; border-radius: 6px;
        border: 1px solid var(--gold-border); white-space: nowrap;
        box-shadow: var(--shadow-sm); z-index: 9999; pointer-events: none;
    }
    /* Expanded state — full sidebar overlay */
    #roosterrun-sidebar.expanded {
        width: 220px; box-shadow: var(--shadow-lg);
    }
    #roosterrun-sidebar.expanded .sb-brand { justify-content: flex-start; padding: 16px 14px; }
    #roosterrun-sidebar.expanded .sb-brand span { display: inline; }
    #roosterrun-sidebar.expanded .sb-title { display: block; }
    #roosterrun-sidebar.expanded .sb-item {

    }
    #roosterrun-sidebar.expanded .sb-item.active { border-left-color: var(--gold); }
    #roosterrun-sidebar.expanded .sb-item i { font-size: 18px; width: 22px; }
    #roosterrun-sidebar.expanded .sb-badge { display: none; }
    #roosterrun-sidebar.expanded .sb-badge.has-count { display: inline-block !important; }
    #roosterrun-sidebar.expanded .sb-divider { margin: 8px 18px; }
    /* Main content */
    #roosterrun-main { margin-left: 60px; width: calc(100vw - 60px); max-width: calc(100vw - 60px); }
    html body #container, body > #container, #container#container {
        margin-left: 60px !important; width: calc(100vw - 60px) !important; max-width: calc(100vw - 60px) !important;
    }
    .table-scroll-wrapper { max-width: calc(100vw - 60px - 32px) !important; }
    #changelist-filter, .card-content#changelist-filter, [id*="changelist-filter"],
    .changelist-filter-wrapper { max-width: calc(100vw - 60px - 32px) !important; }
    .mobile-toggle { display: flex !important; }
    #content, #content-main { padding: 16px !important; }
}

@media (max-width: 767px) {
    #roosterrun-sidebar {
        width: 220px;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    #roosterrun-sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }

    .header-title { max-width: 150px; font-size: 14px !important; }
    /* Filter card fix */
    #changelist-filter, .changelist-filter-wrapper, [id*="changelist-filter"],
    .card-content#changelist-filter {
        background: var(--bg-card) !important;
        border-radius: var(--radius-sm) !important;
        padding: 10px !important;
        border: 1px solid var(--border) !important;
    }
    #changelist-filter label, [id*="changelist-filter"] label {
        font-size: 11px !important;
        color: var(--text-secondary) !important;
    }
    /* Table actions compact */
    .action-btn, a[title="Deposit"], a[title="Withdraw"] {
        width: 32px !important; height: 32px !important; min-width: 32px !important;
        font-size: 12px !important;
    }
    .action-more-btn { width: 32px !important; height: 32px !important; }
}

/* ============ RESPONSIVE — VERY SMALL MOBILE (<400px) ============ */
@media (max-width: 400px) {
    .dash-grid { gap: 8px !important; }
    .dash-card { padding: 10px 12px; }
    .dash-card .value { font-size: 15px; }
    .dash-card .label { font-size: 10px; }
    #roosterrun-header { padding: 6px 8px; }
    .header-title { font-size: 13px !important; max-width: 120px; }
    .user-tabs a, .user-tabs .tab-btn { font-size: 11px !important; padding: 6px 8px !important; }
    /* Even more compact table cells */
    #result_list td, .results td { padding: 6px 4px !important; font-size: 11px !important; }
    #result_list th, .results th { padding: 6px 4px !important; font-size: 9px !important; }
}

/* ============ RESPONSIVE — LAPTOP (1025px–1440px) ============ */
@media (min-width: 1025px) and (max-width: 1440px) {
    #content, #content-main { padding: 20px 24px !important; }
    .dash-grid { grid-template-columns: repeat(4, 1fr) !important; }
}

/* ============ RESPONSIVE — DESKTOP (1441px–1920px) ============ */
@media (min-width: 1441px) and (max-width: 1920px) {
    #content, #content-main { padding: 24px 32px !important; max-width: 1400px; }
    .dash-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 16px !important; }
}

/* ============ RESPONSIVE — LARGE DISPLAY (1921px+) ============ */
@media (min-width: 1921px) {
    #content, #content-main { padding: 28px 40px !important; max-width: 1600px; }
    .dash-grid { grid-template-columns: repeat(5, 1fr) !important; gap: 18px !important; }
    .dash-card .value { font-size: 22px; }
    .dash-table { max-width: 1560px; }
}

/* ============ TOAST / MESSAGE ANIMATIONS ============ */
@keyframes toastSlideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
@keyframes toastFadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(120%); }
}
.toast-leaving { animation: toastFadeOut 0.3s ease forwards; }

/* ============ LOADING SPINNER ============ */
@keyframes kkSpin { to { transform: rotate(360deg); } }
.btn-loading {
    position: relative !important; pointer-events: none !important; opacity: 0.7 !important;
    color: transparent !important;
}
.btn-loading::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 16px; height: 16px; margin: -8px 0 0 -8px;
    border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
    border-radius: 50%; animation: kkSpin 0.6s linear infinite;
}

/* ============ EMPTY STATE ============ */
.admin-empty-state {
    text-align: center; padding: 48px 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px;
}
.admin-empty-state i {
    font-size: 48px !important; color: var(--gold); opacity: 0.35;
    display: block !important; margin-bottom: 12px;
}
.admin-empty-state .empty-title {
    font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;
}
.admin-empty-state .empty-sub {
    font-size: 13px; color: var(--text-muted);
}

/* ============ ACTION BUTTON IMPROVEMENTS ============ */
/* Deposit actions on deposit/withdrawal list pages */
td a[href*="/accept/"], td input[value*="Accept"], td button[name*="accept"] {
    color: var(--success) !important;
}
td a[href*="/reject/"], td input[value*="Reject"], td button[name*="reject"],
td a[href*="/delete/"], a.deletelink {
    color: var(--danger) !important;
}
td a[href*="/approve/"] {
    color: var(--success) !important;
}
/* Consistent min touch target for inline action buttons */
td a[title], td .action-more-btn {
    min-width: 30px; min-height: 30px;
}

/* ============ SCROLLBAR GLOBAL ============ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-track { background: var(--bg-main); }
</style>
{% endblock %}

    document.body.insertAdjacentElement('afterbegin', sidebar);

    // ====== BUILD HEADER ======

    }

    // ====== MOVE FILTER TO TOP + INTEGRATE SEARCH ======
    var changelist = document.getElementById('changelist');
    var filterPanel = document.getElementById('changelist-filter');
    if (changelist && filterPanel) {

    }
    var searchForm = document.getElementById('changelist-search');
    if (searchForm && filterPanel) {
        var searchInput = searchForm.querySelector('input[name="q"]');
        var searchBtn = searchForm.querySelector('button[type="submit"]');
        if (searchInput) {

            var isMobileSearch = window.innerWidth < 768;

            searchInput.style.cssText = (isMobileSearch ? 'width:100%' : 'width:200px') + ' !important;padding:8px 12px !important;border:1px solid var(--border) !important;border-radius:8px !important;font-size:13px !important;background:var(--bg-input) !important;color:var(--text-primary) !important;';
            searchInput.placeholder = 'Search...';
            searchWrapper.appendChild(searchInput);
            if (searchBtn) {
                searchBtn.style.cssText = 'background:var(--accent) !important;color:var(--accent-text) !important;border:none !important;border-radius:8px !important;padding:8px 12px !important;cursor:pointer !important;';
                searchWrapper.appendChild(searchBtn);

            filterPanel.appendChild(searchWrapper);
            searchForm.style.display = 'none';
        }
    }
    var sideWrapper = document.querySelector('.side-wrapper');
    if (sideWrapper) sideWrapper.style.display = 'none';
    if (filterPanel) {
        var isMobile = window.innerWidth < 768;
        var filterDir = isMobile
            ? 'flex-direction:column !important;align-items:stretch !important;'
            : 'flex-direction:row !important;align-items:center !important;';
        filterPanel.style.cssText = 'display:flex !important;flex-wrap:wrap !important;' + filterDir + 'gap:12px !important;width:100% !important;max-width:100% !important;padding:12px 16px !important;background:var(--bg-card) !important;border:1px solid var(--border) !important;border-radius:12px !important;margin-bottom:12px !important;height:auto !important;min-height:0 !important;flex-grow:0 !important;flex-shrink:0 !important;flex-basis:auto !important;align-self:stretch !important;position:static !important;float:none !important;order:-1 !important;';
        var innerRows = filterPanel.querySelectorAll('.row');
        innerRows.forEach(function(row) {
            row.style.cssText = 'display:contents !important;';
        });
        filterPanel.querySelectorAll('.col, [class*="col "]').forEach(function(col) {
            col.style.cssText = isMobile
                ? 'width:100% !important;display:flex !important;align-items:center !important;gap:6px !important;padding:0 !important;margin:0 !important;float:none !important;'

    items.forEach(function(item) {

            return;

    // ====== HELPERS ======
    function showModal(actionType, actionColor, phone, balance, href) {
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = '<div class="modal-content">' +
            '<h2 style="color:' + actionColor + '">' + actionType + ' Funds</h2>' +
            '<p class="info">User: <b>' + phone + '</b></p>' +
            '<p class="balance">Balance: ' + balance + '</p>' +
            '<form method="post" action="' + href + '">' +
            '<input type="hidden" name="csrfmiddlewaretoken" value="' + getCookie('csrftoken') + '">' +
            '<input type="number" name="amount" min="1" step="1" required autofocus placeholder="Enter amount..." style="width:100%;margin-bottom:14px;background:var(--bg-input) !important;border:1px solid var(--border) !important;color:var(--text-primary) !important;">' +
            '<button type="submit" style="background:' + actionColor + ' !important;color:#000 !important;padding:12px;width:100%;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;" onclick="return confirm(\'Confirm ' + actionType.toLowerCase() + '?\')">Confirm ' + actionType + '</button>' +
            '<button type="button" style="background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border);padding:10px;width:100%;border-radius:8px;margin-top:8px;cursor:pointer;font-size:13px;" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
            '</form></div>';
        document.body.appendChild(overlay);
        overlay.querySelector('input[name="amount"]').focus();
        overlay.addEventListener('click', function(ev) { if (ev.target === overlay) overlay.remove(); });
        document.addEventListener('keydown', function esc(ev) { if (ev.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); } });
    }

    function submitAction(href) {
        var form = document.createElement('form');
        form.method = 'POST'; form.action = href;
        var csrf = document.createElement('input');
        csrf.type = 'hidden'; csrf.name = 'csrfmiddlewaretoken'; csrf.value = getCookie('csrftoken');
        form.appendChild(csrf);
        document.body.appendChild(form);
        form.submit();
    }

    function getCookie(name) {
        var v = null;
        if (document.cookie) {
            document.cookie.split(';').forEach(function(c) {
                c = c.trim();
                if (c.substring(0, name.length + 1) === (name + '='))
                    v = decodeURIComponent(c.substring(name.length + 1));
            });
        }
        return v;
    }

    function loadDashboardStats(days) {
        fetch('/admin-api/dashboard-stats/?days=' + days)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('stat-users').textContent = data.users.total;
                document.getElementById('stat-users-sub').textContent = data.users.active + ' active, ' + data.users.blocked + ' blocked';
                document.getElementById('stat-deposits').textContent = '\u20B9' + numberFormat(data.wallet.total_deposits);
                document.getElementById('stat-deposits-sub').textContent = data.wallet.pending_deposits + ' pending';
                document.getElementById('stat-withdrawals').textContent = '\u20B9' + numberFormat(data.wallet.total_withdrawals);
                document.getElementById('stat-withdrawals-sub').textContent = data.wallet.pending_withdrawals + ' pending';
                document.getElementById('stat-balance').textContent = '\u20B9' + numberFormat(data.wallet.total_balance);
                document.getElementById('stat-pending-dep').textContent = data.wallet.pending_deposits;
                document.getElementById('stat-live').textContent = data.matches.live_cockfight + data.matches.live_dice;
                document.getElementById('stat-live-sub').textContent = data.matches.live_cockfight + ' cockfight, ' + data.matches.live_dice + ' dice';

                var tbody = document.getElementById('dash-recent-body');
                if (data.recent_transactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#6B6560;">No transactions yet</td></tr>';
                } else {
                    tbody.innerHTML = data.recent_transactions.map(function(t) {
                        var typeMap = {D:'Deposit',W:'Withdrawal',B:'Bonus',F:'Cockfight',I:'Dice Play',L:'Lottery'};
                        var colorMap = {D:'badge-green',W:'badge-orange',B:'badge-gold',F:'badge-gold',I:'badge-gold',L:'badge-gold',C:'badge-gold',S:'badge-gold'};
                        return '<tr><td style="font-family:monospace;font-size:12px;color:#6B6560;">' + t.hash.substring(0,12) + '</td>' +
                            '<td>' + t.user + '</td>' +
                            '<td><span class="badge ' + (colorMap[t.type]||'badge-gold') + '">' + (typeMap[t.type]||t.type) + '</span></td>' +
                            '<td>\u20B9' + numberFormat(t.amount) + '</td>' +
                            '<td style="color:#6B6560;">' + t.date + '</td></tr>';
                    }).join('');
                }
            })
            .catch(function(err) {
                console.error('Dashboard stats error:', err);
                document.getElementById('stat-users').textContent = '\u2014';
            });
    }

    function numberFormat(n) {
        return parseFloat(n).toLocaleString('en-IN', {maximumFractionDigits: 2});
    }
});

function toggleSidebar() {
    var sb = document.getElementById('roosterrun-sidebar');
    var bd = document.querySelector('.sidebar-backdrop');
    if (!sb) return;
    var w = window.innerWidth;
    if (w >= 768 && w < 1024) {
        sb.classList.toggle('expanded');
        if (bd) bd.classList.toggle('show');
    } else if (w < 768) {
        sb.classList.toggle('open');
        if (bd) bd.classList.toggle('show');
    }
}
function closeSidebar() {
    var sb = document.getElementById('roosterrun-sidebar');
    var bd = document.querySelector('.sidebar-backdrop');
    if (sb) { sb.classList.remove('open'); sb.classList.remove('expanded'); }
    if (bd) bd.classList.remove('show');
}

// ===== REAL-TIME AUTO-REFRESH FOR ALL ADMIN PAGES =====
document.addEventListener('DOMContentLoaded', function() {
(function() {
    var REFRESH_INTERVAL = 10000;
    var DASHBOARD_INTERVAL = 8000;

    var pulseStyle = document.createElement('style');
    pulseStyle.textContent = '@keyframes livePulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }';
    document.head.appendChild(pulseStyle);

    var indicator = document.createElement('div');
    indicator.id = 'live-refresh-indicator';
    indicator.style.cssText = 'position:fixed;top:10px;right:10px;z-index:99999;background:rgba(34,197,94,0.9);color:#000;font-size:11px;font-weight:600;padding:4px 12px;border-radius:12px;display:flex;align-items:center;gap:5px;opacity:0.85;pointer-events:none;transition:opacity 0.3s;';
    indicator.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:#000;display:inline-block;animation:livePulse 1.5s infinite;"></span> LIVE';
    document.body.appendChild(indicator);

    var lightbox = document.createElement('div');
    lightbox.id = 'img-lightbox';
    lightbox.style.cssText = 'display:none;position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;cursor:pointer;';
    lightbox.innerHTML = '<img style="max-width:90%;max-height:90%;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.7);" />' +
        '<span style="position:absolute;top:16px;right:24px;color:#fff;font-size:32px;font-weight:bold;cursor:pointer;">&times;</span>';
    document.body.appendChild(lightbox);
    lightbox.addEventListener('click', function() { lightbox.style.display = 'none'; });
    window.openLightbox = function(url) {
        lightbox.querySelector('img').src = url;
        lightbox.style.display = 'flex';
    };
    document.querySelectorAll('#result_list a[data-lightbox]').forEach(function(a) {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            window.openLightbox(a.getAttribute('href'));
        });
    });

    document.querySelectorAll('#result_list textarea').forEach(function(ta) {
        ta.rows = 2;
        ta.style.height = '36px';
        ta.style.maxHeight = '60px';
        ta.style.width = '120px';
        ta.style.resize = 'vertical';
        ta.style.fontSize = '12px';
        ta.style.padding = '4px 6px';
    });

    document.querySelectorAll('#result_list tbody tr').forEach(function(row) {
        var cells = row.querySelectorAll('td');
        var isProcessed = false;
        cells.forEach(function(c) {
            var t = c.textContent.trim();
            if (t === 'Accepted' || t === 'Rejected' || t === 'Approved') isProcessed = true;
        });
        if (isProcessed) {
            row.querySelectorAll('input, textarea, select').forEach(function(el) {
                el.disabled = true;
                el.style.opacity = '0.5';
                el.style.pointerEvents = 'none';
                el.style.background = 'transparent';
                el.style.border = 'none';
            });
        }
    });

    var _origConfirm = window.confirm;
    window.confirm = function(message) {
        if (message && message.indexOf('unsaved') !== -1) {
            return true;
        }
        return _origConfirm.call(window, message);
    };
    window.onbeforeunload = null;

    function flashIndicator() {
        indicator.style.opacity = '1';
        indicator.style.background = 'rgba(106,189,167,0.95)';
        setTimeout(function() { indicator.style.background = 'rgba(34,197,94,0.9)'; indicator.style.opacity = '0.85'; }, 400);
    }

    function updateSidebarCounts() {
        fetch('/admin-api/sidebar-counts/', { credentials: 'same-origin' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                function setBadge(id, count) {
                    var el = document.getElementById(id);
                    if (!el) return;
                    if (count > 0) {
                        el.textContent = count;
                        el.classList.add('has-count');
                    } else {
                        el.textContent = '';
                        el.classList.remove('has-count');
                    }
                }
                setBadge('badge-dep', data.pending_deposits || 0);
                setBadge('badge-wd', data.pending_withdrawals || 0);
                setBadge('badge-live', data.live_matches || 0);
                setBadge('badge-bets', data.pending_bets || 0);
            })
            .catch(function() {});
    }
    updateSidebarCounts();
    setInterval(updateSidebarCounts, 10000);

    var resultTable = document.getElementById('result_list');
    var changelistForm = document.getElementById('changelist-form');
    var path = window.location.pathname;
    var isListPage = resultTable || changelistForm || (path.match(/^\/[^/]+\/[^/]+\/$/) && !path.includes('/add/') && !path.includes('/change/'));
    if (isListPage) {
        setInterval(function() {
            var url = window.location.href;
            fetch(url, { credentials: 'same-origin' })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newTable = doc.getElementById('result_list');
                    var curTable = document.getElementById('result_list');
                    if (newTable && curTable) {
                        var curInner = curTable.querySelector('table') || curTable;
                        var newInner = newTable.querySelector('table') || newTable;
                        if (curInner.tagName === 'TABLE' && newInner.tagName === 'TABLE') {
                            curInner.innerHTML = newInner.innerHTML;
                        } else {
                            curTable.innerHTML = newTable.innerHTML;
                        }
                    } else if (!curTable && newTable) {
                        var newContent = doc.getElementById('content') || doc.getElementById('content-main');
                        var curContent = document.getElementById('content') || document.getElementById('content-main');
                        if (newContent && curContent) curContent.innerHTML = newContent.innerHTML;
                    }
                    var newPag = doc.querySelector('.paginator');
                    var curPag = document.querySelector('.paginator');
                    if (newPag && curPag) curPag.innerHTML = newPag.innerHTML;
                    var newCount = doc.querySelector('.actions .action-counter');
                    var curCount = document.querySelector('.actions .action-counter');
                    if (newCount && curCount) curCount.textContent = newCount.textContent;
                    var newCLForm = doc.getElementById('changelist-form');
                    var curCLForm = document.getElementById('changelist-form');
                    if (!curTable && newCLForm && curCLForm) curCLForm.innerHTML = newCLForm.innerHTML;
                    else if (newCLForm && !curCLForm) {
                        var newC = doc.getElementById('content') || doc.getElementById('content-main');
                        var curC = document.getElementById('content') || document.getElementById('content-main');
                        if (newC && curC) curC.innerHTML = newC.innerHTML;
                    }
                    flashIndicator();
                    // Re-apply responsive wrappers after auto-refresh
                    if (typeof wrapTablesInScrollWrapper === 'function') wrapTablesInScrollWrapper();
                    if (typeof collapseActionButtons === 'function') collapseActionButtons();
                    if (typeof tagResponsiveColumns === 'function') tagResponsiveColumns();
                })
                .catch(function() {});
        }, REFRESH_INTERVAL);
    }

    var dashEl = document.getElementById('stat-users');
    if (dashEl && typeof loadDashboardStats === 'function') {
        setInterval(function() {
            var activeBtn = document.querySelector('.filter-btn.active');
            var days = activeBtn ? activeBtn.getAttribute('data-days') : '7';
            loadDashboardStats(days || '7');
            flashIndicator();
        }, DASHBOARD_INTERVAL);
    }

    var changeForm = document.getElementById('content-main');
    var isChangeForm = changeForm && !resultTable && window.location.pathname.indexOf('/change') !== -1;
    if (isChangeForm) {
        setInterval(function() {
            fetch(window.location.href, { credentials: 'same-origin' })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newLog = doc.querySelector('.object-history, .timeline');
                    var curLog = document.querySelector('.object-history, .timeline');
                    if (newLog && curLog) curLog.innerHTML = newLog.innerHTML;
                    doc.querySelectorAll('.readonly, .field-status .readonly').forEach(function(newEl) {
                        var fieldName = newEl.closest('.form-row, .field-box');
                        if (fieldName) {
                            var cls = fieldName.className;
                            var cur = document.querySelector('.' + cls.split(' ').join('.') + ' .readonly');
                            if (cur) cur.innerHTML = newEl.innerHTML;
                        }
                    });
                    flashIndicator();
                })
                .catch(function() {});
        }, REFRESH_INTERVAL);
    }


})();
});

// ====== RESPONSIVE LAYOUT FUNCTIONS (separate scope) ======
function wrapTablesInScrollWrapper() {
    var tables = [];
    var rl = document.getElementById('result_list');
    if (rl && rl.tagName === 'TABLE') {
        tables.push(rl);
    } else if (rl) {
        rl.querySelectorAll('table').forEach(function(t) { tables.push(t); });
    }
    document.querySelectorAll('.results table, .dash-table table').forEach(function(t) {
        if (tables.indexOf(t) === -1) tables.push(t);
    });
    tables.forEach(function(table) {
        if (table.closest('.table-scroll-wrapper')) return;
        var wrapper = document.createElement('div');
        wrapper.className = 'table-scroll-wrapper';
        table.parentNode.insertBefore(wrapper, table);
        wrapper.appendChild(table);
    });
}

function collapseActionButtons() {
    var secondaryTitles = ['Statement', 'Bet History', 'Blacklist', 'Whitelist', 'Reset Password'];
    var titleLabels = {
        'Statement': 'S', 'Bet History': 'BH', 'Blacklist': 'BL',
        'Whitelist': 'WL', 'Reset Password': 'PR'
    };
    document.querySelectorAll('td').forEach(function(td) {
        if (td.querySelector('.action-more-wrap')) return;
        var links = td.querySelectorAll('a[title]');
        if (links.length <= 3) return;
        var secondaryLinks = [];
        links.forEach(function(a) {
            if (secondaryTitles.indexOf(a.title) !== -1) {
                secondaryLinks.push(a);
            }
        });
        if (secondaryLinks.length === 0) return;
        var wrap = document.createElement('span');
        wrap.className = 'action-more-wrap';
        var btn = document.createElement('span');
        btn.className = 'action-more-btn';
        btn.innerHTML = '&#8942;';
        btn.title = 'More actions';
        var dropdown = document.createElement('div');
        dropdown.className = 'action-more-dropdown';
        secondaryLinks.forEach(function(a) {
            var clone = a.cloneNode(true);
            var label = titleLabels[a.title] || a.textContent.trim();
            clone.innerHTML = '<span class="more-icon">' + label + '</span> ' + a.title;
            dropdown.appendChild(clone);
            a.style.display = 'none';
        });
        wrap.appendChild(btn);
        wrap.appendChild(dropdown);
        td.appendChild(wrap);
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var isOpen = dropdown.classList.contains('show');
            document.querySelectorAll('.action-more-dropdown.show').forEach(function(d) { d.classList.remove('show'); });
            if (!isOpen) dropdown.classList.add('show');
        });
    });
}

function tagResponsiveColumns() {
    var table = document.getElementById('result_list');
    if (!table) table = document.querySelector('.results table');
    if (!table) return;
    if (table.tagName !== 'TABLE') {
        table = table.querySelector('table');
        if (!table) return;
    }
    var headerCells = table.querySelectorAll('thead th');
    var hideMap = {};
    headerCells.forEach(function(th, idx) {
        var txt = (th.textContent || '').trim().toLowerCase();
        if (txt.indexOf('date') !== -1 || txt.indexOf('joined') !== -1 || txt.indexOf('created') !== -1) {
            hideMap[idx] = 'col-hide-1200';
        }
        if (txt.indexOf('phone') !== -1 || txt.indexOf('mobile') !== -1) {
            hideMap[idx] = 'col-hide-768';
        }
    });
    if (Object.keys(hideMap).length === 0) return;
    table.querySelectorAll('tr').forEach(function(row) {
        var cells = row.querySelectorAll('th, td');
        cells.forEach(function(cell, idx) {
            if (hideMap[idx]) {
                cell.classList.add(hideMap[idx]);
            }
        });
    });
}

// Force container width constraint (overrides external stylesheets)
function fixContainerWidth() {
    var container = document.getElementById('container');
    if (container) {
        var sidebarWidth = 220;
        var w = window.innerWidth;
        if (w < 768) sidebarWidth = 0;
        else if (w < 1024) sidebarWidth = 60;
        container.style.setProperty('width', 'calc(100vw - ' + sidebarWidth + 'px)', 'important');
        container.style.setProperty('max-width', 'calc(100vw - ' + sidebarWidth + 'px)', 'important');
        container.style.setProperty('margin-left', sidebarWidth + 'px', 'important');
        container.style.setProperty('overflow-x', 'hidden', 'important');
        container.style.setProperty('min-width', '0', 'important');
    }
}

// Run responsive functions after DOM is ready
document.addEventListener('DOMContentLoaded', function() {
    fixContainerWidth();
    wrapTablesInScrollWrapper();
    collapseActionButtons();
    tagResponsiveColumns();
    document.addEventListener('click', function() {
        document.querySelectorAll('.action-more-dropdown.show').forEach(function(d) { d.classList.remove('show'); });
    });
    window.addEventListener('resize', function() {
        fixContainerWidth();
        closeSidebar();
    });

    // ====== SIDEBAR DATA-LABEL FOR TABLET TOOLTIPS ======
    document.querySelectorAll('#roosterrun-sidebar .sb-item').forEach(function(item) {
        var text = '';
        item.childNodes.forEach(function(node) {
            if (node.nodeType === 3) text += node.textContent.trim();
        });
        if (text) item.setAttribute('data-label', text);
    });

    // ====== TOAST SETUP (close buttons + auto-dismiss) ======
    document.querySelectorAll('.messagelist li').forEach(function(li) {
        var closeBtn = document.createElement('button');
        closeBtn.className = 'toast-close';
        closeBtn.innerHTML = '&times;';
        closeBtn.addEventListener('click', function() { dismissToast(li); });
        li.appendChild(closeBtn);
        setTimeout(function() { dismissToast(li); }, 6000);
    });

    function dismissToast(el) {
        if (el.classList.contains('toast-leaving')) return;
        el.classList.add('toast-leaving');
        setTimeout(function() { el.remove(); }, 300);
    }

    // ====== FORM SUBMIT LOADING STATE ======
    document.querySelectorAll('form').forEach(function(form) {
        form.addEventListener('submit', function() {
            var btn = form.querySelector('input[type=\"submit\"], button[type=\"submit\"]');
            if (btn && !btn.classList.contains('btn-loading')) {
                btn.classList.add('btn-loading');
            }
        });
    });

    // ====== ENHANCED EMPTY STATE ======
    document.querySelectorAll('.paginator').forEach(function(p) {
        var text = p.textContent.trim();
        if (text.match(/^(0|No )/i) || text === '') {
            var modelName = document.querySelector('.header-title');
            var name = modelName ? modelName.textContent.trim() : 'records';
            p.innerHTML = '<div class=\"admin-empty-state\">' +
                '<i class=\"material-icons\">inbox</i>' +
                '<div class=\"empty-title\">No ' + name.toLowerCase() + ' found</div>' +
                '<div class=\"empty-sub\">Try adjusting your filters or check back later</div>' +
                '</div>';
            p.style.cssText = 'border:none!important;padding:0!important;background:transparent!important;';
        }
    });

    // ====== ESCAPE KEY CLOSES SIDEBAR ======
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSidebar();
    });
});

</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (document.body && document.body.classList.contains('login')) {
        var form = document.getElementById('login-form');
        if (form) {
            var action = form.getAttribute('action') || '';
            if (action.indexOf('next=/') !== -1 && action.indexOf('next=/userManager') === -1 && action.indexOf('next=/admin') === -1) {
                form.setAttribute('action', action.replace('next=/', 'next=/userManager/user/'));
            } else if (action.indexOf('next=') === -1) {
                form.setAttribute('action', action + (action.indexOf('?') === -1 ? '?' : '&') + 'next=/userManager/user/');
            }
        }
    }
});
</script>
